<!DOCTYPE html>
<html lang="ko" data-theme="minimal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="이용권 기반 계산기">
  <title>계산기</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
</head>
<body>
  <main class="app">
    <h1 class="app-title">계산기</h1>
    <p id="ent-status" class="ent-status" aria-live="polite" hidden></p>
    <button type="button" class="buy-cta" id="btn-open-pricing" hidden>구매하기</button>
    <div class="calculator" role="application" aria-label="계산기">
      <div class="display" aria-live="polite">
        <span class="display-value" id="display">0</span>
      </div>
      <div class="keys" id="keys">
        <button type="button" class="key key-fn" data-action="clear" aria-label="전체 지우기">AC</button>
        <button type="button" class="key key-fn" data-action="sign" aria-label="부호">±</button>
        <button type="button" class="key key-fn" data-action="percent" aria-label="퍼센트">%</button>
        <button type="button" class="key key-op" data-action="operator" data-value="/" aria-label="나누기">÷</button>

        <button type="button" class="key key-num" data-action="digit" data-value="7">7</button>
        <button type="button" class="key key-num" data-action="digit" data-value="8">8</button>
        <button type="button" class="key key-num" data-action="digit" data-value="9">9</button>
        <button type="button" class="key key-op" data-action="operator" data-value="*" aria-label="곱하기">×</button>

        <button type="button" class="key key-num" data-action="digit" data-value="4">4</button>
        <button type="button" class="key key-num" data-action="digit" data-value="5">5</button>
        <button type="button" class="key key-num" data-action="digit" data-value="6">6</button>
        <button type="button" class="key key-op" data-action="operator" data-value="-" aria-label="빼기">−</button>

        <button type="button" class="key key-num" data-action="digit" data-value="1">1</button>
        <button type="button" class="key key-num" data-action="digit" data-value="2">2</button>
        <button type="button" class="key key-num" data-action="digit" data-value="3">3</button>
        <button type="button" class="key key-op" data-action="operator" data-value="+" aria-label="더하기">+</button>

        <button type="button" class="key key-num key-zero" data-action="digit" data-value="0">0</button>
        <button type="button" class="key key-num" data-action="decimal" data-value=".">.</button>
        <button type="button" class="key key-eq" data-action="equals" aria-label="계산">=</button>
      </div>
    </div>
  </main>

  <div id="pricing-modal" class="checkout-modal checkout-modal--hidden" aria-hidden="true" role="dialog" aria-labelledby="pricing-title">
    <div class="checkout-modal__backdrop pricing-modal__backdrop" id="pricing-backdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="pricing-modal__shell" role="document">
      <div class="pricing-modal__sparkles" aria-hidden="true"></div>
      <div class="checkout-modal__card pricing-modal__card-inner">
        <p class="pricing-modal__hook">
          <span class="pricing-modal__hook-emoji" aria-hidden="true">💸</span>
          <span class="pricing-modal__hook-text">돈 벌기 1일차</span>
          <span class="pricing-modal__hook-sub">· 여기만 레인보우 플렉스</span>
        </p>
        <h2 id="pricing-title" class="pricing-modal__title">이용권이 필요해요 ✨</h2>
        <p class="checkout-modal__lead">
          <strong>=</strong> 로 결과를 볼 때마다 1회가 차감돼요. 월 구독이면 무제한!
        </p>
        <div class="pricing-actions">
          <button type="button" class="checkout-modal__pay checkout-modal__pay--secondary pricing-modal__btn pricing-modal__btn--pack" id="btn-buy-pack">
            <span class="pricing-modal__btn-shine" aria-hidden="true"></span>
            <span class="pricing-modal__btn-label">10회 이용권 · ₩5,000</span>
          </button>
          <button type="button" class="checkout-modal__pay pricing-modal__btn pricing-modal__btn--sub" id="btn-buy-sub">
            <span class="pricing-modal__btn-shine" aria-hidden="true"></span>
            <span class="pricing-modal__btn-label">월 무제한 · ₩50,000</span>
          </button>
        </div>
        <p class="checkout-modal__note">
          결제는 Stripe Checkout으로 진행돼요. Netlify에 <code>STRIPE_SECRET_KEY</code> 넣고 배포하면 돼요.
        </p>
        <button type="button" class="checkout-modal__close" id="btn-pricing-close">닫기</button>
      </div>
    </div>
  </div>

  <div id="reels-loading-modal" class="checkout-modal checkout-modal--hidden reels-flow-modal" aria-hidden="true" role="status">
    <div class="checkout-modal__backdrop reels-flow-modal__backdrop" aria-hidden="true"></div>
    <div class="reels-flow-modal__card reels-flow-modal__card--loading">
      <div class="reels-flow-modal__spinner" aria-hidden="true"></div>
      <p class="reels-flow-modal__loading-text">결제 처리 중…</p>
    </div>
  </div>

  <div id="reels-done-modal" class="checkout-modal checkout-modal--hidden reels-flow-modal" aria-hidden="true" role="dialog" aria-labelledby="reels-done-title">
    <div class="checkout-modal__backdrop reels-flow-modal__backdrop" id="reels-done-backdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="reels-flow-modal__card reels-flow-modal__card--done" role="document">
      <p class="reels-flow-modal__done-icon" aria-hidden="true">✓</p>
      <h2 id="reels-done-title" class="reels-flow-modal__done-title">결제 완료</h2>
      <p id="reels-done-detail" class="reels-flow-modal__done-detail"></p>
      <button type="button" class="reels-flow-modal__btn reels-flow-modal__btn--primary" id="btn-reels-done-ok">확인</button>
    </div>
  </div>

  <div id="reels-result-modal" class="checkout-modal checkout-modal--hidden reels-result-modal" aria-hidden="true" role="dialog" aria-labelledby="reels-result-heading">
    <div class="checkout-modal__backdrop reels-result-modal__backdrop" id="reels-result-backdrop" tabindex="-1" aria-hidden="true"></div>
    <div class="reels-result-modal__shell" role="document">
      <div class="reels-result-modal__halo" aria-hidden="true"></div>
      <div class="reels-result-modal__inner">
        <div class="reels-result-modal__sparkles" aria-hidden="true"></div>
        <p id="reels-result-heading" class="reels-result-modal__kicker">계산 결과</p>
        <p id="reels-result-value" class="reels-result-modal__value" aria-live="polite">0</p>
        <button type="button" class="reels-flow-modal__btn reels-flow-modal__btn--ghost" id="btn-reels-result-close">닫기</button>
      </div>
    </div>
  </div>

  <aside class="theme-dock" aria-label="계산기 테마 선택">
    <p class="theme-dock__label">테마</p>
    <button type="button" class="theme-chip theme-chip--minimal theme-chip--active" data-theme-id="minimal" aria-pressed="true" title="기본 (배경 없음)">
      <span class="theme-chip__emoji" aria-hidden="true">🧮</span>
      <span>기본</span>
    </button>
    <button type="button" class="theme-chip theme-chip--pink" data-theme-id="pink-cat" aria-pressed="false" title="핑크 냥이">
      <span class="theme-chip__emoji" aria-hidden="true">🎀</span>
      <span>핑크 냥이</span>
    </button>
    <button type="button" class="theme-chip theme-chip--space" data-theme-id="space" aria-pressed="false" title="우주">
      <span class="theme-chip__emoji" aria-hidden="true">🌌</span>
      <span>우주</span>
    </button>
    <button type="button" class="theme-chip theme-chip--parents" data-theme-id="parents" aria-pressed="false" title="엄마아빠의 사랑">
      <span class="theme-chip__emoji" aria-hidden="true">💝</span>
      <span>엄빠사랑</span>
    </button>
    <button type="button" class="theme-chip theme-chip--jesus" data-theme-id="jesus" aria-pressed="false" title="예수님">
      <span class="theme-chip__emoji" aria-hidden="true">🕊️</span>
      <span>예수님</span>
    </button>
  </aside>

  <script src="stripe-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
