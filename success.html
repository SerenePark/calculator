<!DOCTYPE html>
<html lang="ko" data-lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>결제 완료</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes.css">
  <script>
    try {
      var _t = localStorage.getItem("calc_theme");
      if (_t) document.documentElement.setAttribute("data-theme", _t);
      else document.documentElement.setAttribute("data-theme", "minimal");
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "minimal");
    }
  </script>
</head>
<body class="success-page">
  <main class="success-card">
    <p id="success-status" class="success-status" data-i18n="successChecking">확인 중…</p>
    <a class="success-link" href="index.html" id="success-back" hidden data-i18n="successBack">계산기로 돌아가기</a>
  </main>
  <script src="i18n.js"></script>
  <script src="stripe-config.js"></script>
  <script>
    CalcI18n.apply(document);
    document.title = CalcI18n.t("successTitle");

    (function () {
      var statusEl = document.getElementById("success-status");
      var back = document.getElementById("success-back");
      var base = typeof window.STRIPE_API_BASE === "string" ? window.STRIPE_API_BASE : "";
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get("session_id");

      function showBack() {
        back.hidden = false;
      }

      if (!sessionId) {
        statusEl.textContent = CalcI18n.t("successNoSession");
        showBack();
        return;
      }

      var url =
        base +
        "/.netlify/functions/verify-session?session_id=" +
        encodeURIComponent(sessionId);

      fetch(url)
        .then(function (r) {
          return r.json();
        })
        .then(function (data) {
          if (data.ok && data.type === "pack") {
            var cur = parseInt(localStorage.getItem("calc_ent_credits") || "0", 10);
            var add = data.creditsToAdd != null ? data.creditsToAdd : 10;
            localStorage.setItem("calc_ent_credits", String(cur + add));
            statusEl.textContent = CalcI18n.t("successPack", { n: add });
          } else if (data.ok && data.type === "subscription") {
            var existing = parseInt(localStorage.getItem("calc_ent_sub_until") || "0", 10);
            var next = Math.max(existing, data.subscriptionEndsAt || 0);
            localStorage.setItem("calc_ent_sub_until", String(next));
            statusEl.textContent = CalcI18n.t("successSub");
          } else if (data.reason === "unpaid") {
            statusEl.textContent = CalcI18n.t("successUnpaid");
          } else {
            statusEl.textContent =
              (data.error && String(data.error)) || CalcI18n.t("successGeneric");
          }
        })
        .catch(function () {
          statusEl.textContent = CalcI18n.t("successNetwork");
        })
        .finally(showBack);
    })();
  </script>
</body>
</html>
